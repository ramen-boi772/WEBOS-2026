<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WEBOS 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="light">

<!-- Boot Screen -->
<div class="boot" id="boot">
  <div class="boot-logo">WEBOS 2026</div>
  <div class="loader"></div>
</div>

<div class="desktop" id="desktop">

<!-- Start Menu -->
<div class="start" id="start">
  <div onclick="openApp('calc')">🧮 Calculator</div>
  <div onclick="openApp('note')">📝 Notepad</div>
  <div onclick="openApp('browser')">🌐 Browser</div>
  <div onclick="openApp('settings')">⚙ Settings</div>
</div>

<!-- Calculator -->
<div class="window" id="calc">
  <div class="header">Calculator <span onclick="closeApp('calc')">✖</span></div>
  <div class="content">
    <input type="text" id="display" readonly>
    <div class="calc-grid">
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button onclick="press('/')">÷</button>
      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button onclick="press('*')">×</button>
      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button onclick="press('-')">−</button>
      <button onclick="press('0')">0</button>
      <button onclick="press('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="press('+')">+</button>
      <button onclick="clearCalc()">C</button>
    </div>
  </div>
</div>

<!-- Notepad -->
<div class="window" id="note">
  <div class="header">Notepad <span onclick="closeApp('note')">✖</span></div>
  <div class="content">
    <textarea id="notes" onkeyup="saveNotes()"></textarea>
  </div>
</div>

<!-- Browser -->
<div class="window large" id="browser">
  <div class="header">Browser <span onclick="closeApp('browser')">✖</span></div>
  <div class="content">
    <div class="browser-bar">
      <input type="text" id="url" placeholder="Enter website...">
      <button onclick="loadSite()">Go</button>
    </div>
    <iframe id="frame"></iframe>
  </div>
</div>

<!-- Settings -->
<div class="window" id="settings">
  <div class="header">Settings <span onclick="closeApp('settings')">✖</span></div>
  <div class="content">
    <button onclick="toggleTheme()">Toggle Light/Dark</button>
    <br><br>
    <input type="file" id="wallInput" accept="image/*">
  </div>
</div>

<!-- Taskbar -->
<div class="taskbar">
  <div class="task-icon" onclick="toggleStart()">🪟</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
