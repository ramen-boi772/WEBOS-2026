<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VexoOS 2026 Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="light">

<!-- BOOT -->
<div class="boot" id="boot">
  <div class="boot-logo">VexoOS 2026</div>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop">

  <!-- START MENU -->
  <div class="start" id="start">
    <div onclick="openApp('calc')">🧮 Calculator</div>
    <div onclick="openApp('note')">📝 Notepad</div>
    <div onclick="openApp('browser')">🌐 Browser</div>
    <div onclick="toggleTheme()">🌙 Toggle Theme</div>
  </div>

  <!-- CALC -->
  <div class="window" id="calc">
    <div class="header" onmousedown="dragStart(event,this.parentElement)">
      <span>Calculator</span>
      <div>
        <button onclick="minimizeApp('calc')">—</button>
        <button onclick="closeApp('calc')">✖</button>
      </div>
    </div>
    <div class="content">
      <input type="text" id="display" readonly>
      <div class="calc-grid">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('/')">÷</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('*')">×</button>
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('-')">−</button>
        <button onclick="press('0')">0</button>
        <button onclick="clearCalc()">C</button>
        <button onclick="calculate()">=</button>
        <button onclick="press('+')">+</button>
      </div>
    </div>
  </div>

  <!-- NOTEPAD -->
  <div class="window" id="note">
    <div class="header" onmousedown="dragStart(event,this.parentElement)">
      <span>Notepad</span>
      <div>
        <button onclick="minimizeApp('note')">—</button>
        <button onclick="closeApp('note')">✖</button>
      </div>
    </div>
    <div class="content">
      <textarea id="notes" onkeyup="saveNotes()"></textarea>
    </div>
  </div>

  <!-- BROWSER -->
  <div class="window large" id="browser">
    <div class="header" onmousedown="dragStart(event,this.parentElement)">
      <span>Browser</span>
      <div>
        <button onclick="minimizeApp('browser')">—</button>
        <button onclick="closeApp('browser')">✖</button>
      </div>
    </div>
    <div class="content">
      <div class="browser-bar">
        <button onclick="goBack()">⬅</button>
        <button onclick="goForward()">➡</button>
        <input type="text" id="url" placeholder="Search or enter website...">
        <button onclick="loadSite()">Go</button>
      </div>
      <iframe id="frame"></iframe>
    </div>
  </div>

</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div onclick="toggleStart()">🪟</div>
  <div id="task-apps"></div>
</div>

<script src="script.js"></script>
</body>
</html>
