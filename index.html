<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WEBOS 2026</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="light">

<div class="boot-screen" id="bootScreen">
  <h1>WEBOS 2026</h1>
</div>

<div class="desktop" id="desktop">

  <!-- Settings Panel -->
  <div class="settings-panel">
    <button onclick="toggleTheme()">Toggle Theme</button>
    <input type="file" id="wallpaperInput" accept="image/*">
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <div class="taskbar-icon" onclick="openWindow()">🪟</div>
  </div>

  <!-- App Window -->
  <div class="window" id="appWindow">
    <div class="window-header">
      My App
      <span onclick="closeWindow()">✖</span>
    </div>
    <div class="window-content">
      Welcome to WEBOS 2026 🚀
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
<!-- START MENU -->
<div class="start-menu" id="startMenu">
  <div onclick="openApp('calculator')">🧮 Calculator</div>
  <div onclick="openApp('notepad')">📝 Notepad</div>
  <div onclick="openApp('settings')">⚙ Settings</div>
</div>

<!-- CALCULATOR -->
<div class="window" id="calculator">
  <div class="window-header">
    Calculator
    <span onclick="closeApp('calculator')">✖</span>
  </div>
  <div class="window-content">
    <input id="calcDisplay" readonly>
    <div class="calc-buttons">
      <button onclick="calc('7')">7</button>
      <button onclick="calc('8')">8</button>
      <button onclick="calc('9')">9</button>
      <button onclick="calc('/')">÷</button>
      <button onclick="calc('4')">4</button>
      <button onclick="calc('5')">5</button>
      <button onclick="calc('6')">6</button>
      <button onclick="calc('*')">×</button>
      <button onclick="calc('1')">1</button>
      <button onclick="calc('2')">2</button>
      <button onclick="calc('3')">3</button>
      <button onclick="calc('-')">−</button>
      <button onclick="calc('0')">0</button>
      <button onclick="calc('.')">.</button>
      <button onclick="calc('=')">=</button>
      <button onclick="calc('+')">+</button>
      <button onclick="calc('C')">C</button>
    </div>
  </div>
</div>

<!-- NOTEPAD -->
<div class="window" id="notepad">
  <div class="window-header">
    Notepad
    <span onclick="closeApp('notepad')">✖</span>
  </div>
  <div class="window-content">
    <textarea id="notepadArea" onkeyup="saveNotes()"></textarea>
  </div>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
  <div class="window-header">
    Settings
    <span onclick="closeApp('settings')">✖</span>
  </div>
  <div class="window-content">
    <button onclick="toggleTheme()">Toggle Light/Dark</button>
    <input type="file" id="wallpaperInput" accept="image/*">
  </div>
</div>
